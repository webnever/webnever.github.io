<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  /* The 1920x1080 Background Container */
  .background {
    background-image: url('aetherwebnever/bg.png');
    background-size: cover;
    background-position: center;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* Centered Hyperlink Image */
  .center-link img {
    width: 500px; /* Adjust size as needed */
    transition: transform 1.22332s ease;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 8px;
  }

  .center-link img:hover {
    transform: scale(1.1);
  }

  /* Audio Interface */
  .audio-container {
    margin-top: 30px;
    background: rgba(0, 0, 0, 0.6);
    padding: 20px;
    border-radius: 15px;
    color: white;
    font-family: sans-serif;
  }

  .track {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
  }
</style>
</head>
<body>

<div class="background">
  <!-- Hyperlink Image -->
  <a href="https://eyeskiessea.bandcamp.com/album/aether-webnever" class="center-link">
    <img src="aetherwebnever/aetherwebnever.jpg" alt="Enter">
  </a>

  <!-- Playable Audio Tracks -->
  <div class="audio-container">
    <div class="track">
      <label>Every Inner Laser </label>
      <audio controls>
        <source src="aetherwebnever/everyInnerLaser.mp3" type="audio/mpeg">
      </audio>
    </div>
    
    <div class="track">
      <label>Unsend</label>
      <audio controls>
        <source src="aetherwebnever/unsend.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>
</div>

</body>
</html>
