<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshots</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --hover-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Image Cards */
        .gallery-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.5);
            background-color: var(--hover-color);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid #333;
        }

        .file-name {
            padding: 12px;
            font-size: 0.85rem;
            text-align: center;
            word-wrap: break-word;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Simple Lightbox/Modal */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #lightbox-caption {
            position: absolute;
            bottom: 20px;
            color: white;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        #close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

        const basePath = "./screenshotArchive/";
        const galleryContainer = document.getElementById("gallery");
        
        // Lightbox Elements
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxCaption = document.getElementById("lightbox-caption");
        const closeBtn = document.getElementById("close-btn");

        // Build the grid
        files.forEach(fileName => {
            const itemDiv = document.createElement("div");
            itemDiv.className = "gallery-item";
            
            const imagePath = basePath + encodeURIComponent(fileName).replace(/%20/g, ' '); // Keep spaces for local path formatting

            // Create Image
            const img = document.createElement("img");
            img.src = imagePath;
            img.alt = fileName;
            img.loading = "lazy"; // Optimize loading
            
            // Handle broken images gracefully
            img.onerror = function() {
                this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" fill="%23333"><rect width="100%" height="100%" fill="%23222"/><text x="50%" y="50%" fill="%23666" font-family="sans-serif" font-size="14" text-anchor="middle" alignment-baseline="middle">Image Not Found</text></svg>';
            };

            // Create Label
            const label = document.createElement("div");
            label.className = "file-name";
            label.textContent = fileName;

            // Assemble and Append
            itemDiv.appendChild(img);
            itemDiv.appendChild(label);
            galleryContainer.appendChild(itemDiv);

            // Lightbox Event Listener
            itemDiv.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightboxCaption.textContent = fileName;
                lightbox.style.display = 'flex';
            });
        });

        // Close Lightbox
        const closeLightbox = () => lightbox.style.display = 'none';
        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });
    </script>
</body>
</html>
