<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Is Get</title>
    <style>
        /* Centers the player perfectly in the middle of the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Takes up the full viewport height */
            margin: 0;
            background-color: #f4f4f9; 
        }

        /* Styles the default audio element to look like a prominent miniplayer */
        audio {
            width: 400px; /* Big enough to stand out */
            height: 50px;
            border-radius: 30px; /* Gives it a sleek, pill-like miniplayer shape */
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); /* Adds depth */
            outline: none;
        }
    </style>
</head>
<body>

    <audio src="whatIsGet/whatIsGet.mp3" controls></audio>
