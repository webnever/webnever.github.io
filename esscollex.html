        function loadMedia() {
            const container = document.getElementById('gallery');

            if (mediaFiles.length === 0) {
                container.innerHTML = "No media found in library.";
                return;
            }

            container.innerHTML = mediaFiles.map(src => {
                // Ensure spaces in filenames are URL-encoded
                const encodedSrc = src.replace(/ /g, '%20');
                const isVideo = src.toLowerCase().endsWith('.mp4');
                const fileName = src.split('/').pop();

                return `
                    <div class="media-card">
                        <a href="${encodedSrc}" target="_blank" style="position:relative; display:block;">
                            ${isVideo ? `
                                <video class="media-content" muted loop onmouseover="this.play()" onmouseout="this.pause()">
                                    <source src="${encodedSrc}" type="video/mp4">
                                </video>
                            ` : `
                                <img src="${encodedSrc}" class="media-content" loading="lazy" alt="${fileName}">
                            `}
                        </a>
                        <div class="label" title="${fileName}">${fileName}</div>
                    </div>
                `;
            }).join('');
        }

        // Initialize gallery
        loadMedia();
