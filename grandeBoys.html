<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grandeBoys2017</title>
    <style>
        /* Center the content on the page */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* Container to control the maximum size of the image layout */
        .container {
            width: 100%;
            max-width: 800px; /* Adjust this to your preferred max size */
        }

        /* The core image styling */
        .responsive-image {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* Optional: adds rounded corners */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Hover effect to make it feel interactive */
        .responsive-image:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Remove default link styling */
        .image-link {
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Replace '[https://via.placeholder.com/800x450](https://via.placeholder.com/800x450)' with your actual image path -->
        <a href="[https://www.youtube.com/@grandeboys9145](https://www.youtube.com/@grandeboys9145)" 
           class="image-link" 
           target="_blank" 
           rel="noopener noreferrer">
            
            <img src="[grandeBoys/Screenshot2026-05-02.png](grandeBoys/Screenshot2026-05-02.png)" 
                 alt="Visit grande boys on YouTube" 
                 class="responsive-image">
                 
        </a>
    </div>

</body>
</html>
