            box-sizing: border-box;

        body {
            background: #000;
            font-family: 'MSMINCHO';
            font-size: 32px;
            color: white;

        /* General styles for centering content */
        .viewport {
            height: 100vh; /* Fixed height for the gallery viewport */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: hidden; /* Hide vertical overflow */
        }

        /* First viewport with logo and sandclock */
        #title {
            position: relative;
            text-align: center;
        }

        #awlogo {
            margin-bottom: auto; /* Pushes the sandclock down */
            padding-top: 250px; /* Add padding to push the logo down from the top */
        }

        #imageLink {
            position: absolute;
            bottom: 15%; /* Positioned 25% from the bottom */
        }

        /* Gallery Styles */
        .gallery {
            display: flex;
            overflow-x: auto; /* Allow horizontal scrolling */
            scroll-behavior: smooth;
            white-space: nowrap;
            padding: 20px;
            height: 800px; /* Ensure the gallery takes the full height of its parent */
        }

        .gallery img {
            max-width: 800px; /* Maintain image width, but allow scaling */
            height: auto; /* Keep the aspect ratio */
            margin-right: 10px;
            border-radius: 10px;
            transition: transform 0.2s ease-in-out;
        }

        /* Second viewport with CD and audio controls */
        #mixtape {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #audioControls {
            position: absolute;
            bottom: 15%; /* Positioned 25% from the bottom */
            width: 40%;
        }

        /* Third viewport */
        #black {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-image: url('black.png');
            background-position: center;
            background-size: 70%;
            background-repeat: no-repeat;
        }

    </style>
</head>
