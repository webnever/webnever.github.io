<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFE IS PAIN</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container {
            display: flex;
            gap: 20px; /* Space between the two GIFs */
            padding: 20px;
        }

        img {
            max-width: 45vw; /* Prevents them from overflowing the screen width */
            max-height: 80vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="gif-container">
        <img src="LifeIsPain/Pain1.gif" alt="First GIF">
        <img src="LifeIsPain/Pain2.gif" alt="Second GIF">
    </div>

</body>
</html>
