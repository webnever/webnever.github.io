<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @font-face {
            font-family: 'MSMINCHO';
            src: url('MSMINCHO.TTF') format('truetype');
        }
        * {margin: 0; padding: 0}
        body {
            background: #000;
            font-family: 'MSMINCHO';
            font-size: 32px;
            color: white;
        }
        canvas {display: block;}
        #poem {
            position: relative;
            height: 100vh; /* Poem div also occupies full viewport height */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center; 
            width: 100%;
            background-image: url('black3.png'); /* Replace with your image path */
            background-position: calc(50% - 100px) calc(50% + 30px); /* Adjust as needed */
            background-size: unset;
            background-repeat: no-repeat;
        }
        #poem p {
            color: white; /* Text color */
            text-shadow:
                -2px -2px 0 #000,  
                2px -2px 0 #000,
                -2px  2px 0 #000,
                2px  2px 0 #000; /* Outline effect */
        }
    </style>
</head>
<body>
    <canvas>
            
    </canvas>
    <div style="position: absolute; bottom: 0px; right: 0px;">
        
    </div>
    <div id="poem">
        <center><p>
        black sun shining, serpent bleeding, dawn graving,<br>
        crypt lurking, magic voiding, crystal computing,<br>
        junkie mystic sadhu, in the holy garden, of sex and war,<br>
        breathing pneuma, the life web nexus, like its oxygen,<br>
        just another angel, and another demon,<br>
        in a glass ball, haunted world.<br>
        </p></center>
        <center><a href="https://discord.gg/nnqb4uj8d4" id="imageLink" target="_blank">
            <img src="sandclock.gif"> <!-- Small image hyperlink -->
        </a></center>
    </div>
    <script>
        // Initialising the canvas
        var canvas = document.querySelector('canvas'),
            ctx = canvas.getContext('2d');

        // Setting the width and height of the canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Setting up the letters
        var letters = 'אבגדהוזחטיךכלםמןנסעףפץצקרשת';
        letters = letters.split('');

        // Setting up the columns
        var fontSize = 25; // Increased font size
        var columns = canvas.width / fontSize; // Adjust number of columns based on new font size

        // Setting up the drops
        var drops = [];
        for (var i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        // Setting up the draw function
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, .1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            for (var i = 0; i < drops.length; i++) {
                var text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillStyle = '#0f0';
                ctx.font = fontSize + 'px Arial';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                drops[i] += 0.5;
                if (drops[i] * fontSize > canvas.height && Math.random() > .95) {
                    drops[i] = 0;
                }
            }
            // Draw the image with its own alpha handling
            if (fadeIn && opacity < 0.75) {
                opacity += 0.005; // Adjust fade-in speed here
                drawImageWithAlpha();
            } else if (fadeIn) {
                drawImageWithAlpha();
            }

            requestAnimationFrame(draw);
        }

        // Loop the animation
        requestAnimationFrame(draw);

        var image = new Image();
        image.src = 'dnscrypt2.png'; // Replace with the path to your image
        var opacity = 0;
        var fadeIn = false;

        image.onload = function() {
            // Start the fade-in process after the image is loaded
            fadeIn = true;
        };

        function drawImage() {
            if (!fadeIn) return;
            opacity += 0.005; // Decrease this value to slow down the fade-in
            if (opacity > 1) opacity = 1;
            var x = canvas.width / 2 - image.width / 2;
            var y = canvas.height / 2 - image.height / 2;
            ctx.globalAlpha = opacity;
            ctx.drawImage(image, x, y);
            ctx.globalAlpha = 1;
            if (opacity < 1) {
                requestAnimationFrame(drawImage);
            }
        }

        function drawImageWithAlpha() {
            ctx.globalAlpha = opacity;
            ctx.drawImage(image, canvas.width / 2 - image.width / 2, canvas.height / 2 - image.height / 2);
            ctx.globalAlpha = 1; // Reset global alpha
        }

    </script>
</body>
