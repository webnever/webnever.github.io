<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESSCOLLEX</title>
    <style>
        body { background: #0e1117; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h2 { border-bottom: 1px solid #30363d; padding-bottom: 10px; color: #58a6ff; font-weight: 400; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .media-card { 
            background: #161b22; 
            border: 1px solid #30363d;
            border-radius: 8px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s;
        }
        .media-card:hover { border-color: #58a6ff; }

        /* Unified sizing for both images and videos */
        .media-content {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
        }

        .label { 
            font-size: 11px; 
            color: #8b949e; 
            padding: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: #1c2128;
        }

        /* GIF indicator badge */
        .badge {
            position: absolute;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h2>./ESSCOLLEX</h2>
    <div class="gallery" id="gallery">loading library...</div>

    <script>
        async function loadMedia() {
            const container = document.getElementById('gallery');
            const folder = 'ESSCOLLEX';
            const path = `~/${folder}/`;

            try {
                const response = await fetch(path);
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const links = Array.from(doc.querySelectorAll('a'))
                    .map(a => a.getAttribute('href'))
                    .filter(href => {
                        // Added mp4 to the regex
                        return href.match(/\.(jpe?g|png|gif|webp|avif|mp4)$/i) && !href.includes('..');
                    });

                if (links.length === 0) {
                    container.innerHTML = "No media found in " + path;
                    return;
                }

                container.innerHTML = links.map(src => {
                    const cleanSrc = src.includes(folder) ? src : `${path}${src}`;
                    const isVideo = src.toLowerCase().endsWith('.mp4');
                    const fileName = decodeURIComponent(src.split('/').pop());

                    return `
                        <div class="media-card">
                            <a href="${cleanSrc}" target="_blank" style="position:relative; display:block;">
                                ${isVideo ? `
                                    <video class="media-content" muted loop onmouseover="this.play()" onmouseout="this.pause()">
                                        <source src="${cleanSrc}" type="video/mp4">
                                    </video>
                                ` : `
                                    <img src="${cleanSrc}" class="media-content" loading="lazy">
                                `}
                            </a>
                            <div class="label" title="${fileName}">${fileName}</div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                container.innerHTML = "Access Denied.";
            }
        }
        loadMedia();
    </script>
</body>
</html>
